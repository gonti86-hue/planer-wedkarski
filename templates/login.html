<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Zaloguj się do Planera Wędkarskiego — oceny warunków wędkarskich dla jezior Wulpińskie i Sarąg.">
    <meta name="theme-color" id="meta-theme-color" content="#2d6a4f">
    <meta name="color-scheme" content="light dark">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/icon.svg">
    <title>Logowanie — Planer Wędkarski</title>
    <script>
    (function(){try{var t=localStorage.getItem('wedkar_theme');if(t!=='light'&&t!=='dark'){t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
    </script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">

<button type="button" id="login-theme-toggle" class="login-theme-toggle"
        aria-label="Przełącz motyw" aria-pressed="false" onclick="przelaczMotyw()">🌙</button>

<div class="login-wrapper">
    <div class="login-logo">
        <span class="login-fish">🎣</span>
        <h1>Planer Wędkarski</h1>
        <p>Jezioro Wulpińskie &amp; Jezioro Sarąg</p>
    </div>

    <!-- ZAKŁADKI -->
    <div class="login-tabs" role="tablist" aria-label="Logowanie lub rejestracja">
        <button class="login-tab {% if blad_r %}{% else %}active{% endif %}" type="button"
                role="tab" aria-controls="panel-login"
                aria-selected="{% if blad_r %}false{% else %}true{% endif %}"
                id="tab-login" onclick="pokazTab('login')">
            Zaloguj się
        </button>
        <button class="login-tab {% if blad_r %}active{% endif %}" type="button"
                role="tab" aria-controls="panel-register"
                aria-selected="{% if blad_r %}true{% else %}false{% endif %}"
                id="tab-register" onclick="pokazTab('register')">
            Zarejestruj się
        </button>
    </div>

    <!-- PANEL LOGOWANIA -->
    <div class="login-panel" id="panel-login" role="tabpanel" aria-labelledby="tab-login"
         style="display:{% if blad_r %}none{% else %}block{% endif %}">
        {% if blad_l %}
        <div class="login-blad" role="alert">⚠ {{ blad_l }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="akcja" value="login">
            <div class="login-pole">
                <label>Nick</label>
                <input type="text" name="username" autocomplete="username"
                       placeholder="Twój nick" required autofocus>
            </div>
            <div class="login-pole">
                <label>Hasło</label>
                <input type="password" name="password" autocomplete="current-password"
                       placeholder="Hasło" required>
            </div>
            <button type="submit" class="btn-login">➜ Zaloguj się</button>
        </form>
    </div>

    <!-- PANEL REJESTRACJI -->
    <div class="login-panel" id="panel-register"
         style="display:{% if blad_r %}block{% else %}none{% endif %}">
        {% if blad_r %}
        <div class="login-blad">⚠ {{ blad_r }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="akcja" value="register">
            <div class="login-pole">
                <label>Nick <small>(3–20 znaków: litery, cyfry, _ lub -)</small></label>
                <input type="text" name="reg_username" autocomplete="username"
                       placeholder="Wybierz nick" required
                       pattern="[a-zA-Z0-9_\-]{3,20}" title="3–20 znaków: litery, cyfry, _ lub -">
            </div>
            <div class="login-pole">
                <label>Hasło <small>(min. 8 znaków)</small></label>
                <input type="password" name="reg_password" autocomplete="new-password"
                       placeholder="Wybierz hasło" required minlength="8">
            </div>
            <div class="login-pole">
                <label>Powtórz hasło</label>
                <input type="password" name="reg_password2" autocomplete="new-password"
                       placeholder="Powtórz hasło" required minlength="8">
            </div>
            <button type="submit" class="btn-login btn-login-green">✓ Zarejestruj się</button>
        </form>
    </div>

    <p class="login-info">
        Każdy użytkownik ma swój prywatny dziennik połowów.<br>
        Dane pogodowe i mapy są wspólne dla wszystkich.
    </p>
</div>

<script>
function pokazTab(ktory) {
    var jestLogin = ktory === 'login';
    document.getElementById('panel-login').style.display    = jestLogin ? 'block' : 'none';
    document.getElementById('panel-register').style.display = jestLogin ? 'none' : 'block';
    document.getElementById('tab-login').classList.toggle('active',    jestLogin);
    document.getElementById('tab-register').classList.toggle('active', !jestLogin);
    document.getElementById('tab-login').setAttribute('aria-selected',    jestLogin ? 'true' : 'false');
    document.getElementById('tab-register').setAttribute('aria-selected', jestLogin ? 'false' : 'true');
}

function _ustawMetaThemeColor(t) {
    var m = document.getElementById('meta-theme-color');
    if (m) m.setAttribute('content', t === 'dark' ? '#0f172a' : '#2d6a4f');
}
function _aktualizujPrzyciskMotywu(t) {
    var b = document.getElementById('login-theme-toggle');
    if (!b) return;
    var ciemny = t === 'dark';
    b.textContent = ciemny ? '☀️' : '🌙';
    b.setAttribute('aria-pressed', ciemny ? 'true' : 'false');
    var label = ciemny ? 'Włącz tryb jasny' : 'Włącz tryb ciemny';
    b.setAttribute('aria-label', label);
    b.title = label;
}
function przelaczMotyw() {
    var obecny = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
    var nowy = obecny === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', nowy);
    try { localStorage.setItem('wedkar_theme', nowy); } catch (e) {}
    _ustawMetaThemeColor(nowy);
    _aktualizujPrzyciskMotywu(nowy);
}
(function initMotyw() {
    var t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
    _ustawMetaThemeColor(t);
    _aktualizujPrzyciskMotywu(t);
})();

if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').catch(function () {});
    });
}
</script>

</body>
</html>
